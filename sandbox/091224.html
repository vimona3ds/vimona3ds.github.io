<!DOCTYPE html>
<html lang="en">

<head>
  <title>spiraltype</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #333;
      font-family: monospace;
      font-weight: 400;
      display: grid;
      align-items: center;
      justify-content: center;
    }

    #game {
      aspect-ratio: 1;
      display: grid;
      justify-content: center;
      justify-items: center;
      align-items: center;
      width: min(100vh, 100vw);
    }

    .letter {
      display: flex;
      justify-content: center;
      justify-items: center;
      align-items: center;
      font-size: 2.5rem;
      aspect-ratio: 1;
      width: 100%;
      color: #666;
    }

    .error {
      color: #e66;
    }

    #cursor {
      position: absolute;
      background-color: #fff;
      opacity: 0.2;
      transition: all 0.1s ease-out;
    }

    #cursor.done {
      top: 50%;
      left: 50%;
      width: 90vw;
      aspect-ratio: 1.4;
      transform: translate(-50%, -50%);
      opacity: 0.4;
    }

    #score {
      display: grid;
      width: 100%;
      height: 100%;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: all 0.1s ease-out;
      font-size: 20vw;
    }

    #cursor.done #score {
      opacity: 1;
    }
  </style>
</head>

<body>
  <div id="game"></div>
  <div id="cursor">
    <div id="score"></div>
  </div>

  <script>
    const WORDLIST = ["the", "of", "to", "and", "a", "in", "is", "it", "you", "that", "he", "was", "for", "on", "are", "with", "as", "I", "his", "they", "be", "at", "one", "have", "this", "from", "or", "had", "by", "not", "word", "but", "what", "some", "we", "can", "out", "other", "were", "all", "there", "when", "up", "use", "your", "how", "said", "an", "each", "she", "which", "do", "their", "time", "if", "will", "way", "about", "many", "then", "them", "write", "would", "like", "so", "these", "her", "long", "make", "thing", "see", "him", "two", "has", "look", "more", "day", "could", "go", "come", "did", "number", "sound", "no", "most", "people", "my", "over", "know", "water", "than", "call", "first", "who", "may", "down", "side", "been", "now", "find", "any", "new", "work", "part", "take", "get", "place", "made", "live", "where", "after", "back", "little", "only", "round", "man", "year", "came", "show", "every", "good", "me", "give", "our", "under", "name", "very", "through", "just", "form", "sentence", "great", "think", "say", "help", "low", "line", "differ", "turn", "cause", "much", "mean", "before", "move", "right", "boy", "old", "too", "same", "tell", "does", "set", "three", "want", "air", "well", "also", "play", "small", "end", "put", "home", "read", "hand", "port", "large", "spell", "add", "even", "land", "here", "must", "big", "high", "such", "follow", "act", "why", "ask", "men", "change", "went", "light", "kind", "off", "need", "house", "picture", "try", "us", "again", "animal", "point", "mother", "world", "near", "build", "self", "earth", "father"]
    const GAME_READY = 0
    const GAME_PLAYING = 1
    const GAME_RESULTS = 2

    const gameNode = document.getElementById("game")
    const scoreNode = document.getElementById("score")
    const cursorNode = document.getElementById("cursor")

    let nodes = []
    let size = 1
    let sentence = ""
    let cursor = 0
    let timer = undefined
    let state = GAME_READY

    function restartGame() {
      nodes = []
      size += 2;
      sentence = ""
      cursor = 0
      timer = undefined
      state = GAME_READY

      // make sentence
      while (sentence.length < size ** 2) {
        sentence += WORDLIST[Math.floor(Math.random() * WORDLIST.length)] + " "
      }

      sentence = sentence.substr(0, size ** 2)

      // prepare dom
      gameNode.style.gridTemplateColumns = `repeat(${size}, 1fr)`
      gameNode.innerHTML = ""
      scoreNode.innerHTML = ""
      cursorNode.classList.remove("done")

      // make grid
      for (let i = 0; i < sentence.length; i++) {
        const char = sentence[i]
        const charNode = document.createElement("div")
        charNode.classList.add("letter")
        charNode.style.fontSize = `calc(min(100vh, 100vw) / ${size} / 2)`
        const textNode = document.createTextNode(char)
        charNode.appendChild(textNode)
        gameNode.appendChild(charNode)
        nodes.push(charNode)
      }

      const CENTER = Math.floor(size / 2)
      let i = CENTER
      let j = CENTER
      let amt = 1
      let dir = 1
      let count = 0

      while (i >= 0 && i < size && j >= 0 && j < size) {
        for (let a = 0; a < amt; a++) {
          if (i < 0 || i >= size || j < 0 || j >= size) {
            break;
          }

          nodes[count++].style.order = size * i + j
          i -= dir
        }
        for (let a = 0; a < amt; a++) {
          if (i < 0 || i >= size || j < 0 || j >= size) {
            break;
          }

          nodes[count++].style.order = size * i + j
          j += dir;
        }
        amt++
        dir *= -1;
      }

      updateCursor()
    }

    function stopTimer() {
      const ms = Date.now() - timer
      const minutes = ms / 1000 / 60
      const wpm = (size ** 2) / minutes / 5

      cursorNode.style.top = ""
      cursorNode.style.left = ""
      cursorNode.style.width = ""
      cursorNode.style.height = ""
      cursorNode.classList.add("done")

      scoreNode.innerHTML = `${wpm.toPrecision(4)}`
      state = GAME_RESULTS
    }

    function checkGameComplete() {
      if (cursor >= nodes.length) {
        stopTimer()
      }
    }

    function updateCursor() {
      if (cursor >= nodes.length) {
        stopTimer()
        return;
      }

      const { top, left, width, height } = nodes[cursor].getBoundingClientRect()
      cursorNode.style.top = `${top}px`
      cursorNode.style.left = `${left}px`
      cursorNode.style.width = `${width}px`
      cursorNode.style.height = `${height}px`
    }

    window.addEventListener("keydown", ({ key }) => {
      if (state == GAME_READY) {
        timer = Date.now()
        state = GAME_PLAYING
      }

      if (state == GAME_PLAYING) {
        if (key === sentence[cursor]) {
          nodes[cursor++].classList.remove("error")
          updateCursor()
        } else {
          nodes[cursor].classList.add("error")
        }

        checkGameComplete()
      } else if (state == GAME_RESULTS) {
        restartGame()
      }
    })

    window.addEventListener("resize", updateCursor)

    updateCursor()
    restartGame()
  </script>
</body>

</html>
