    <style>
        @font-face {
            font-family: 'OCRAStd';
            src: url('assets/OCRAStd.otf') format('opentype');
        }

        * {
            --background-color: #000000;
            --foreground-color: #e1f0ee;
            --foreground-color-alt: #96adcd;
            margin: 0;
            padding: 0;
        }

        body {
            height: 100svh;
            width: 100svw;
            font-family: 'OCRAStd', monospace;
            font-size: 20px;
            background-color: var(--background-color);
            color: var(--foreground-color);
            display: flex;
            justify-content: center;
            align-items: center;
            line-height: 1.5;
            letter-spacing: -3px;
        }

        a {
            color: var(--foreground-color);
        }

        a:active, a:hover {
            color: var(--foreground-color-alt);
        }

        .interface {
            /* width: min(700px, 100vw); */
        }

        .container {
            /* border: 1px solid var(--foreground-color); */
        }

        .header {
            /* border-bottom: 1px solid var(--foreground-color); */
        }

        .avatar {
            filter: drop-shadow(0 0 2px var(--foreground-color));
            border: 2px solid var(--foreground-color);
            width: 320px;
        }

        .list {
            list-style: none;
            margin: 0;
            padding: 0;
        }

        .list li strong {
            background-color: var(--foreground-color);
            color: var(--background-color);
            filter: drop-shadow(0 0 2px var(--foreground-color));
        }
    </style>
